name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "$PACKAGE_VERSION" = "$TAG_VERSION"

      - name: Run validation
        run: npm run validate

      - name: Ensure generated runtime-dist is committed
        run: git diff --exit-code -- runtime-dist

      - name: Ensure npm version is not already published
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "x-for-github-copilot@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "x-for-github-copilot@${PACKAGE_VERSION} is already published" >&2
            exit 1
          fi

      - name: Pack npm distribution
        run: npm pack --pack-destination release-assets

      - name: Generate release metadata
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          PACKAGE_TGZ="release-assets/x-for-github-copilot-${PACKAGE_VERSION}.tgz"
          PACKAGE_SHA="$(shasum -a 256 "$PACKAGE_TGZ" | awk '{print $1}')"
          npm run release:manifest -- \
            --version "$PACKAGE_VERSION" \
            --tag "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --output-dir release-assets \
            --npm-package-sha256 "$PACKAGE_SHA"

      - name: Publish npm package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/release-manifest.json
            release-assets/tracks.json
            release-assets/*.tgz
